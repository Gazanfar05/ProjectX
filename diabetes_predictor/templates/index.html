<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Monitor - ProjectX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .glucose-display {
            font-size: 3rem;
            font-weight: bold;
            color: #2d3748;
            text-align: center;
            margin: 20px 0;
        }
        
        .risk-indicator {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin: 15px 0;
        }
        
        .risk-none {
            background: #48bb78;
            color: white;
        }
        
        .risk-warning {
            background: #ed8936;
            color: white;
        }
        
        .risk-critical {
            background: #f56565;
            color: white;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🩺 Diabetes Monitor</h1>
            <p>AI-Powered Hypoglycemia Prediction System</p>
        </div>
        
        <div class="dashboard">
            <!-- Current Status Card -->
            <div class="card">
                <h2>📊 Current Status</h2>
                <div class="glucose-display" id="currentGlucose">--</div>
                <p style="text-align: center; color: #718096;">mg/dL</p>
                <div id="riskIndicator" class="risk-indicator risk-none">
                    No Data Yet
                </div>
                <div id="statusMessage" class="status-message"></div>
                <button onclick="refreshStatus()" style="margin-top: 15px;">Refresh Status</button>
            </div>
            
            <!-- Add Glucose Reading Card -->
            <div class="card">
                <h2>🩸 Add Glucose Reading</h2>
                <form id="glucoseForm" onsubmit="addGlucoseReading(event)">
                    <div class="form-group">
                        <label>User ID</label>
                        <input type="text" id="userId" value="user001" required>
                    </div>
                    <div class="form-group">
                        <label>Glucose Level (mg/dL)</label>
                        <input type="number" id="glucoseLevel" step="0.1" required>
                    </div>
                    <button type="submit">Add Reading</button>
                </form>
            </div>
            
            <!-- Add Medication Card -->
            <div class="card">
                <h2>💊 Log Medication</h2>
                <form id="medicationForm" onsubmit="addMedication(event)">
                    <div class="form-group">
                        <label>Medication Type</label>
                        <select id="medType" required>
                            <option value="insulin">Insulin</option>
                            <option value="oral">Oral Medication</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Medication Name</label>
                        <input type="text" id="medName" placeholder="e.g., Humalog" required>
                    </div>
                    <div class="form-group">
                        <label>Dosage (units)</label>
                        <input type="number" id="dosage" step="0.1" required>
                    </div>
                    <button type="submit">Log Medication</button>
                </form>
            </div>
            
            <!-- Add Lifestyle Event Card -->
            <div class="card">
                <h2>🍽️ Log Lifestyle Event</h2>
                <form id="lifestyleForm" onsubmit="addLifestyleEvent(event)">
                    <div class="form-group">
                        <label>Event Type</label>
                        <select id="eventType" required onchange="toggleEventFields()">
                            <option value="meal">Meal</option>
                            <option value="exercise">Exercise</option>
                            <option value="sleep">Sleep</option>
                        </select>
                    </div>
                    <div class="form-group" id="carbsGroup">
                        <label>Carbohydrates (g)</label>
                        <input type="number" id="carbs" step="0.1">
                    </div>
                    <div class="form-group" id="durationGroup" style="display:none;">
                        <label>Duration (minutes)</label>
                        <input type="number" id="duration">
                    </div>
                    <div class="form-group" id="intensityGroup" style="display:none;">
                        <label>Intensity</label>
                        <select id="intensity">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <button type="submit">Log Event</button>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        let currentUserId = 'user001';
        
        function toggleEventFields() {
            const eventType = document.getElementById('eventType').value;
            const carbsGroup = document.getElementById('carbsGroup');
            const durationGroup = document.getElementById('durationGroup');
            const intensityGroup = document.getElementById('intensityGroup');
            
            if (eventType === 'meal') {
                carbsGroup.style.display = 'block';
                durationGroup.style.display = 'none';
                intensityGroup.style.display = 'none';
            } else if (eventType === 'exercise') {
                carbsGroup.style.display = 'none';
                durationGroup.style.display = 'block';
                intensityGroup.style.display = 'block';
            } else {
                carbsGroup.style.display = 'none';
                durationGroup.style.display = 'block';
                intensityGroup.style.display = 'none';
            }
        }
        
        async function addGlucoseReading(event) {
            event.preventDefault();
            
            currentUserId = document.getElementById('userId').value;
            const glucoseLevel = document.getElementById('glucoseLevel').value;
            
            try {
                const response = await fetch(`${API_URL}/glucose`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: currentUserId,
                        glucose_level: parseFloat(glucoseLevel),
                        timestamp: new Date().toISOString()
                    })
                });
                
                const data = await response.json();
                updateStatus(data);
                document.getElementById('glucoseForm').reset();
                document.getElementById('userId').value = currentUserId;
            } catch (error) {
                alert('Error adding glucose reading: ' + error.message);
            }
        }
        
        async function addMedication(event) {
            event.preventDefault();
            
            const medType = document.getElementById('medType').value;
            const medName = document.getElementById('medName').value;
            const dosage = document.getElementById('dosage').value;
            
            try {
                await fetch(`${API_URL}/medication`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: currentUserId,
                        medication_type: medType,
                        medication_name: medName,
                        dosage: parseFloat(dosage),
                        timestamp: new Date().toISOString()
                    })
                });
                
                document.getElementById('medicationForm').reset();
                alert('Medication logged successfully!');
            } catch (error) {
                alert('Error logging medication: ' + error.message);
            }
        }
        
        async function addLifestyleEvent(event) {
            event.preventDefault();
            
            const eventType = document.getElementById('eventType').value;
            const carbs = document.getElementById('carbs').value;
            const duration = document.getElementById('duration').value;
            const intensity = document.getElementById('intensity').value;
            
            try {
                await fetch(`${API_URL}/lifestyle`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: currentUserId,
                        event_type: eventType,
                        carbs: carbs ? parseFloat(carbs) : null,
                        duration_minutes: duration ? parseInt(duration) : null,
                        intensity: intensity || null,
                        timestamp: new Date().toISOString()
                    })
                });
                
                document.getElementById('lifestyleForm').reset();
                alert('Lifestyle event logged successfully!');
            } catch (error) {
                alert('Error logging event: ' + error.message);
            }
        }
        
        async function refreshStatus() {
            try {
                const response = await fetch(`${API_URL}/status/${currentUserId}`);
                const data = await response.json();
                
                if (data.status === 'no_data') {
                    document.getElementById('currentGlucose').textContent = '--';
                    document.getElementById('riskIndicator').textContent = 'No Data Available';
                    document.getElementById('riskIndicator').className = 'risk-indicator risk-none';
                } else {
                    document.getElementById('currentGlucose').textContent = data.latest_glucose.toFixed(1);
                    updateStatus(data);
                }
            } catch (error) {
                console.error('Error refreshing status:', error);
            }
        }
        
        function updateStatus(data) {
            const riskIndicator = document.getElementById('riskIndicator');
            const statusMessage = document.getElementById('statusMessage');
            
            riskIndicator.className = `risk-indicator risk-${data.alert_level}`;
            riskIndicator.textContent = `Risk Score: ${(data.risk_score * 100).toFixed(1)}%`;
            statusMessage.textContent = data.message || data.alert_message;
            
            if (data.latest_glucose) {
                document.getElementById('currentGlucose').textContent = data.latest_glucose.toFixed(1);
            }
        }
        
        // Auto-refresh every 30 seconds
        setInterval(refreshStatus, 30000);
    </script>
</body>
</html>
